<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Furugi">
<meta name="theme-color" content="#0a0a0a">
<title>Furugi OS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1c1c1c;--border:#272727;--green:#3ecf6e;--yellow:#e8a838;--blue:#4a90d9;--red:#e74c3c;--text:#f0f0f0;--muted:#666}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
#app{display:flex;flex-direction:column;height:100dvh;overflow:hidden}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;padding-top:max(10px,env(safe-area-inset-top))}
.logo{font-family:'Space Mono',monospace;font-size:16px;font-weight:700;color:var(--green);letter-spacing:4px}
.logo span{color:var(--muted);font-size:10px;letter-spacing:2px;display:block;margin-top:-2px}
.tabs{display:flex;gap:3px}
.tab{background:none;color:var(--muted);border:1px solid var(--border);border-radius:6px;padding:5px 11px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500}
.tab.active{background:var(--green);color:#000;border-color:var(--green);font-weight:700}
.stats-row{display:flex;gap:6px;padding:10px 14px;overflow-x:auto;border-bottom:1px solid var(--border);flex-shrink:0;scrollbar-width:none}
.stats-row::-webkit-scrollbar{display:none}
.stat{background:var(--surface);border-radius:8px;padding:7px 11px;border:1px solid var(--border);min-width:72px;flex-shrink:0}
.stat-label{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-family:'Space Mono',monospace}
.stat-val{font-size:15px;font-weight:700;margin-top:2px;font-family:'Space Mono',monospace}
.chat-wrap{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;scrollbar-width:none}
.chat-wrap::-webkit-scrollbar{display:none}
.bubble{max-width:84%;padding:10px 14px;font-size:13px;line-height:1.55;border-radius:14px}
.bubble.user{align-self:flex-end;background:var(--green);color:#000;border-bottom-right-radius:3px;font-weight:500}
.bubble.ai{align-self:flex-start;background:var(--surface2);color:var(--text);border-bottom-left-radius:3px;border:1px solid var(--border)}
.typing{align-self:flex-start;background:var(--surface2);border:1px solid var(--border);border-radius:14px 14px 14px 3px;padding:10px 16px;font-size:18px;color:var(--muted)}
.input-row{padding:10px 14px;padding-bottom:max(10px,env(safe-area-inset-bottom));border-top:1px solid var(--border);display:flex;gap:8px;background:var(--surface);flex-shrink:0}
.msg-input{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:9px 14px;font-size:13px;outline:none;font-family:'DM Sans',sans-serif;resize:none;max-height:80px}
.send-btn{background:var(--green);color:#000;border:none;border-radius:10px;padding:9px 16px;font-weight:700;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;flex-shrink:0}
.quick-actions{display:flex;gap:6px;padding:8px 14px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;border-bottom:1px solid var(--border)}
.quick-actions::-webkit-scrollbar{display:none}
.qa-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:20px;padding:5px 12px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;flex-shrink:0}
.list-wrap{flex:1;overflow-y:auto;padding:0 14px 12px;scrollbar-width:none}
.list-wrap::-webkit-scrollbar{display:none}
.controls{display:flex;gap:6px;padding:10px 0;position:sticky;top:0;background:var(--bg);z-index:10}
.controls input,.controls select{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:7px 10px;font-size:12px;outline:none;font-family:'DM Sans',sans-serif}
.controls input{flex:1;min-width:0}
.count-label{font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;padding-bottom:6px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;font-size:8px;color:var(--muted);padding:6px 8px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:1.5px;font-family:'Space Mono',monospace;white-space:nowrap;position:sticky;top:0;background:var(--bg)}
/* tappable rows via position:relative + ::after overlay */
tbody tr{position:relative;cursor:pointer}
tbody tr:active td{background:#1c1c1c}
tbody tr td{padding:10px 8px;border-bottom:1px solid var(--border);vertical-align:middle}
/* full-row tap target */
tbody tr td:first-child::before{content:'';position:absolute;inset:0;z-index:1}
.badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:.5px;font-family:'Space Mono',monospace}
.badge.sold{background:#3ecf6e18;color:var(--green);border:1px solid #3ecf6e33}
.badge.posted{background:#e8a83818;color:var(--yellow);border:1px solid #e8a83833}
.badge.unposted{background:#4a90d918;color:var(--blue);border:1px solid #4a90d933}
.badge.kept{background:#66666618;color:var(--muted);border:1px solid #66666633}
.badge.sourced{background:#9b59b618;color:#9b59b6;border:1px solid #9b59b633}
.badge.cleaned{background:#1abc9c18;color:#1abc9c;border:1px solid #1abc9c33}
.badge.photographed{background:#e67e2218;color:#e67e22;border:1px solid #e67e2233}
.badge.shipped{background:#3ecf6e18;color:var(--green);border:1px solid #3ecf6e33}
.green{color:var(--green);font-weight:600;font-family:'Space Mono',monospace}
.red{color:var(--red);font-weight:600;font-family:'Space Mono',monospace}
.muted{color:var(--muted)}
.td-item{max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.td-mono{font-family:'Space Mono',monospace;font-size:11px}
.row-btn{display:contents;background:none;border:none;color:inherit;font:inherit;cursor:pointer;text-align:left;width:100%;}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:#000a;z-index:100;display:flex;align-items:flex-end}
.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:88dvh;overflow-y:auto;border-top:1px solid var(--border)}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:15px;font-weight:700;margin-bottom:4px}
.modal-sku{font-family:'Space Mono',monospace;font-size:10px;color:var(--green);margin-bottom:16px}
.field-group{margin-bottom:14px}
.field-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-family:'Space Mono',monospace;margin-bottom:5px}
.field-input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:10px 12px;font-size:14px;outline:none;font-family:'DM Sans',sans-serif}
textarea.field-input{resize:vertical;min-height:60px}
.status-grid{display:flex;flex-wrap:wrap;gap:6px}
.status-chip{padding:7px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--muted);touch-action:manipulation;user-select:none}
.status-chip.active{border-color:var(--green);color:var(--green);background:#3ecf6e18}
.platform-grid{display:flex;flex-wrap:wrap;gap:6px}
.platform-chip{padding:7px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--muted);touch-action:manipulation;user-select:none}
.platform-chip.active{border-color:var(--blue);color:var(--blue);background:#4a90d918}
.modal-actions{display:flex;gap:8px;margin-top:20px;padding-bottom:env(safe-area-inset-bottom)}
.btn{padding:12px 16px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;border:none;flex:1;touch-action:manipulation}
.btn-primary{background:var(--green);color:#000}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-danger{background:#e74c3c18;color:var(--red);border:1px solid #e74c3c33}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.hidden{display:none}
/* ANALYTICS */
.analytics-wrap{flex:1;overflow-y:auto;padding:14px;scrollbar-width:none}
.analytics-wrap::-webkit-scrollbar{display:none}
.section-title{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.metric-card-title{font-size:11px;color:var(--muted);margin-bottom:8px}
.metric-big{font-family:'Space Mono',monospace;font-size:24px;font-weight:700;color:var(--green)}
.metric-sub{font-size:11px;color:var(--muted);margin-top:4px}
.trip-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.trip-bar-wrap{width:100%;background:var(--surface2);border-radius:4px;height:4px;margin-top:4px}
.trip-bar{height:4px;border-radius:4px;background:var(--green)}
.cat-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px}
.suggest-card{background:var(--surface2);border:1px solid var(--green);border-radius:12px;padding:14px;margin-bottom:8px}
.suggest-reason{font-size:11px;color:var(--muted);margin-top:4px}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="logo">FURUGI<span>INVENTORY OS</span></div>
    <div class="tabs">
      <button class="tab active" onclick="setView('chat',this)">Chat</button>
      <button class="tab" onclick="setView('list',this)">Stock</button>
      <button class="tab" onclick="setView('analytics',this)">Intel</button>
    </div>
  </div>
  <div class="stats-row" id="statsRow"><div class="muted" style="font-size:12px;padding:4px">Loading...</div></div>

  <!-- CHAT -->
  <div id="chatView" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
    <div class="quick-actions">
      <button class="qa-btn" onclick="quickSend('What should I post next?')">📬 Post Next</button>
      <button class="qa-btn" onclick="quickSend('What has been sitting unposted the longest?')">⏳ Sitting Items</button>
      <button class="qa-btn" onclick="quickSend('Give me a profit summary by trip')">📊 Trip ROI</button>
      <button class="qa-btn" onclick="quickSend('Which categories sell fastest?')">🔥 Hot Categories</button>
      <button class="qa-btn" onclick="quickSend('What is my sell-through rate?')">📈 Sell-Through</button>
    </div>
    <div class="chat-wrap" id="chatWrap"></div>
    <div class="input-row">
      <textarea class="msg-input" id="msgInput" rows="1" placeholder="Jordan 4s sold for $65… grabbed 4 items for $30…"></textarea>
      <button class="send-btn" onclick="send()">→</button>
    </div>
  </div>

  <!-- STOCK -->
  <div id="listView" style="display:none;flex-direction:column;flex:1;overflow:hidden">
    <div class="list-wrap">
      <div class="controls">
        <input type="text" id="searchInput" placeholder="Search..." oninput="renderList()">
        <select id="filterSel" onchange="renderList()">
          <option value="all">All</option>
          <option value="unposted">Unposted</option>
          <option value="posted">Posted</option>
          <option value="sold">Sold</option>
          <option value="sourced">Sourced</option>
          <option value="cleaned">Cleaned</option>
          <option value="photographed">Photographed</option>
          <option value="shipped">Shipped</option>
          <option value="kept">Kept</option>
        </select>
        <select id="sortSel" onchange="renderList()">
          <option value="trip">Trip</option>
          <option value="profit">Profit</option>
          <option value="sold">Sold $</option>
          <option value="name">Name</option>
        </select>
      </div>
      <div class="count-label" id="countLabel"></div>
      <table>
        <thead>
          <tr>
            <th>Item</th>
            <th>Status</th>
            <th>Cost</th>
            <th>Sold</th>
            <th>Profit</th>
            <th>Trip</th>
          </tr>
        </thead>
        <tbody id="listBody"></tbody>
      </table>
    </div>
  </div>

  <!-- INTEL -->
  <div id="analyticsView" style="display:none;flex-direction:column;flex:1;overflow:hidden">
    <div class="analytics-wrap" id="analyticsWrap"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalName"></div>
    <div class="modal-sku" id="modalSku"></div>
    <div class="field-group">
      <div class="field-label">Status</div>
      <div class="status-grid" id="statusGrid"></div>
    </div>
    <div class="two-col">
      <div class="field-group">
        <div class="field-label">Cost</div>
        <input type="number" inputmode="decimal" class="field-input" id="mCost" placeholder="0.00">
      </div>
      <div class="field-group">
        <div class="field-label">Sold Price</div>
        <input type="number" inputmode="decimal" class="field-input" id="mSoldPrice" placeholder="0.00">
      </div>
    </div>
    <div class="two-col">
      <div class="field-group">
        <div class="field-label">Category</div>
        <select class="field-input" id="mCategory">
          <option value="">—</option>
          <option>Tee</option><option>Hoodie</option><option>Jacket</option>
          <option>Flannel</option><option>Rugby</option><option>Workwear</option>
          <option>Denim</option><option>Pants</option><option>Shoes</option>
          <option>Hat</option><option>Bag</option><option>Vest</option>
          <option>Crewneck</option><option>Polo</option><option>Military</option><option>Other</option>
        </select>
      </div>
      <div class="field-group">
        <div class="field-label">Tier</div>
        <select class="field-input" id="mTier">
          <option value="1">Tier 1 — Flip</option>
          <option value="2">Tier 2 — Archive</option>
        </select>
      </div>
    </div>
    <div class="field-group">
      <div class="field-label">Measurements</div>
      <input type="text" class="field-input" id="mMeasurements" placeholder="P2P: 22 | Length: 28 | Sleeve: 25">
    </div>
    <div class="field-group">
      <div class="field-label">Condition / Archive Notes</div>
      <textarea class="field-input" id="mNotes" placeholder="Single stitch, made in USA, sun fade on shoulders..."></textarea>
    </div>
    <div class="field-group">
      <div class="field-label">Platforms Listed</div>
      <div class="platform-grid" id="platformGrid"></div>
    </div>
    <div class="field-group">
      <div class="field-label">Depop Link</div>
      <input type="url" class="field-input" id="mDepopLink" placeholder="https://depop.com/...">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" onclick="deleteItem()">Delete</button>
      <button class="btn btn-primary" onclick="saveItem()">Save</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://zvxzlgqjhtrdtzqdftij.supabase.co";
const FN_URL = `${SUPABASE_URL}/functions/v1/swift-task`;
const STATUSES = ['sourced','cleaned','photographed','unposted','posted','sold','shipped','kept'];
const PLATFORMS = ['Depop','Grailed','eBay','Mercari','Poshmark'];

let items = [];
let totalSpend = 814;
let msgs = [{role:"ai",text:"What's good Dee. Talk to me — what sold, what you picking up, what needs to get posted?"}];
let currentView = "chat";
let editingItemId = null;

function genSku(trip, city) {
  const d = new Date();
  const ds = `${String(d.getFullYear()).slice(2)}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
  const cc = (city||'NO').toUpperCase().slice(0,2);
  const n = String(items.length+1).padStart(3,'0');
  return `FG-${cc}-${ds}-${n}`;
}

async function loadData() {
  try {
    const r = await fetch(FN_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({loadData:true})});
    const d = await r.json();
    if(d.items){items=d.items;totalSpend=d.totalSpend||814;}
  } catch(e){console.error(e);}
  renderStats();
  renderChat();
}

function getStats() {
  const sold = items.filter(i=>i.status==="sold");
  const posted = items.filter(i=>i.status==="posted");
  const pipeline = items.filter(i=>["unposted","sourced","cleaned","photographed"].includes(i.status));
  const revenue = sold.reduce((s,i)=>s+(i.sold_price||0),0);
  const profit = revenue - totalSpend;
  const str = items.length>0?Math.round((sold.length/items.length)*100):0;
  return {sold,posted,pipeline,revenue,profit,str};
}

function renderStats() {
  const {sold,posted,pipeline,revenue,profit,str} = getStats();
  document.getElementById("statsRow").innerHTML = `
    <div class="stat"><div class="stat-label">Unposted</div><div class="stat-val" style="color:var(--blue)">${pipeline.length}</div></div>
    <div class="stat"><div class="stat-label">Posted</div><div class="stat-val" style="color:var(--yellow)">${posted.length}</div></div>
    <div class="stat"><div class="stat-label">Sold</div><div class="stat-val" style="color:var(--green)">${sold.length}</div></div>
    <div class="stat"><div class="stat-label">Spent</div><div class="stat-val" style="color:var(--red)">$${totalSpend.toFixed(0)}</div></div>
    <div class="stat"><div class="stat-label">Revenue</div><div class="stat-val" style="color:var(--green)">$${revenue.toFixed(0)}</div></div>
    <div class="stat"><div class="stat-label">Profit</div><div class="stat-val" style="color:${profit>=0?'var(--green)':'var(--red)'}">${profit>=0?"+":""}$${profit.toFixed(0)}</div></div>
    <div class="stat"><div class="stat-label">STR</div><div class="stat-val">${str}%</div></div>
  `;
}

function renderChat() {
  const wrap = document.getElementById("chatWrap");
  wrap.innerHTML = msgs.map(m=>`<div class="bubble ${m.role}">${m.text.replace(/\n/g,'<br>')}</div>`).join("");
  wrap.scrollTop = wrap.scrollHeight;
}

function renderList() {
  const search = document.getElementById("searchInput").value.toLowerCase();
  const filter = document.getElementById("filterSel").value;
  const sort = document.getElementById("sortSel").value;
  let list = items.filter(i=>(filter==="all"||i.status===filter)&&(i.name||"").toLowerCase().includes(search));
  if(sort==="trip") list.sort((a,b)=>(a.trip||1)-(b.trip||1));
  else if(sort==="profit") list.sort((a,b)=>((b.sold_price||0)-(b.cost||0))-((a.sold_price||0)-(a.cost||0)));
  else if(sort==="sold") list.sort((a,b)=>(b.sold_price||0)-(a.sold_price||0));
  else if(sort==="name") list.sort((a,b)=>(a.name||"").localeCompare(b.name||""));
  document.getElementById("countLabel").textContent = `${list.length} items`;

  document.getElementById("listBody").innerHTML = list.map(item=>{
    const p = item.status==="sold" ? (item.sold_price||0)-(item.cost||0) : null;
    return `<tr>
      <td colspan="6" style="padding:0;border-bottom:1px solid var(--border)">
        <button class="row-btn" onclick="openItem('${item.id}')" style="display:flex;align-items:center;width:100%;padding:10px 8px;background:none;border:none;color:inherit;font:inherit;cursor:pointer;text-align:left;gap:0;-webkit-appearance:none;">
          <span style="flex:2;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;font-size:12px;padding-right:6px">${item.name}</span>
          <span style="flex:1.2;white-space:nowrap"><span class="badge ${item.status}">${item.status}</span></span>
          <span style="flex:0.8;font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);white-space:nowrap">${item.cost>0?`$${Number(item.cost).toFixed(2)}`:`—`}</span>
          <span style="flex:0.8;font-family:'Space Mono',monospace;font-size:11px;white-space:nowrap">${item.status==="sold"?`<span class="green">$${item.sold_price}</span>`:`<span class="muted">—</span>`}</span>
          <span style="flex:0.9;font-family:'Space Mono',monospace;font-size:11px;white-space:nowrap">${p!==null?`<span class="${p>=0?'green':'red'}">${p>=0?"+":""}$${p.toFixed(2)}</span>`:`<span class="muted">—</span>`}</span>
          <span style="flex:0.5;font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);white-space:nowrap">T${item.trip||1}</span>
        </button>
      </td>
    </tr>`;
  }).join("");
}

function setView(v, btn) {
  currentView = v;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("chatView").style.display = v==="chat"?"flex":"none";
  document.getElementById("listView").style.display = v==="list"?"flex":"none";
  document.getElementById("analyticsView").style.display = v==="analytics"?"flex":"none";
  if(v==="list") renderList();
  if(v==="analytics") renderAnalytics();
}

function openItem(id) {
  const item = items.find(i=>String(i.id)===String(id));
  if(!item) return;
  editingItemId = id;
  document.getElementById("modalName").textContent = item.name;
  document.getElementById("modalSku").textContent = item.sku||genSku(item.trip,item.trip_city);
  document.getElementById("mCost").value = item.cost||'';
  document.getElementById("mSoldPrice").value = item.sold_price||'';
  document.getElementById("mMeasurements").value = item.measurements||'';
  document.getElementById("mNotes").value = item.notes||'';
  document.getElementById("mDepopLink").value = item.depop_link||'';
  document.getElementById("mCategory").value = item.category||'';
  document.getElementById("mTier").value = item.tier||'1';

  document.getElementById("statusGrid").innerHTML = STATUSES.map(s=>
    `<div class="status-chip ${item.status===s?'active':''}" data-status="${s}">${s}</div>`
  ).join('');
  document.querySelectorAll(".status-chip").forEach(c=>{
    c.addEventListener("click",()=>{
      document.querySelectorAll(".status-chip").forEach(x=>x.classList.remove("active"));
      c.classList.add("active");
    });
  });

  const activePlats = item.platforms||[];
  document.getElementById("platformGrid").innerHTML = PLATFORMS.map(p=>
    `<div class="platform-chip ${activePlats.includes(p)?'active':''}" data-plat="${p}">${p}</div>`
  ).join('');
  document.querySelectorAll(".platform-chip").forEach(c=>{
    c.addEventListener("click",()=>c.classList.toggle("active"));
  });

  document.getElementById("modalOverlay").classList.remove("hidden");
}

function closeModal() {
  document.getElementById("modalOverlay").classList.add("hidden");
  editingItemId = null;
}

document.getElementById("modalOverlay").addEventListener("click", e=>{
  if(e.target===document.getElementById("modalOverlay")) closeModal();
});

async function saveItem() {
  const item = items.find(i=>String(i.id)===String(editingItemId));
  if(!item) return;
  const newStatus = document.querySelector(".status-chip.active")?.dataset.status||item.status;
  const platforms = [...document.querySelectorAll(".platform-chip.active")].map(c=>c.dataset.plat);
  const updates = {
    status: newStatus,
    cost: parseFloat(document.getElementById("mCost").value)||item.cost||0,
    sold_price: parseFloat(document.getElementById("mSoldPrice").value)||item.sold_price||0,
    measurements: document.getElementById("mMeasurements").value,
    notes: document.getElementById("mNotes").value,
    depop_link: document.getElementById("mDepopLink").value,
    category: document.getElementById("mCategory").value,
    tier: document.getElementById("mTier").value,
    platforms,
    sku: document.getElementById("modalSku").textContent
  };
  Object.assign(item, updates);
  try {
    await fetch(FN_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({actions:{action:"update",id:item.id,...updates}})});
  } catch(e){}
  closeModal();
  renderStats();
  if(currentView==="list") renderList();
  if(currentView==="analytics") renderAnalytics();
}

async function deleteItem() {
  if(!confirm("Delete this item?")) return;
  items = items.filter(i=>String(i.id)!==String(editingItemId));
  try {
    await fetch(FN_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({actions:{action:"delete",id:editingItemId}})});
  } catch(e){}
  closeModal();
  renderStats();
  renderList();
}

function renderAnalytics() {
  const {sold,posted,pipeline,revenue,profit,str} = getStats();
  const trips = {};
  items.forEach(i=>{
    const t = i.trip||1;
    if(!trips[t]) trips[t]={revenue:0,sold:0,total:0,city:i.trip_city||''};
    trips[t].total++;
    if(i.status==="sold"){trips[t].revenue+=(i.sold_price||0);trips[t].sold++;}
  });
  const tripKeys = Object.keys(trips).sort((a,b)=>a-b);
  const maxRev = Math.max(...tripKeys.map(k=>trips[k].revenue),1);
  const cats = {};
  items.forEach(i=>{
    const c = i.category||'Uncategorized';
    if(!cats[c]) cats[c]={total:0,sold:0,revenue:0};
    cats[c].total++;
    if(i.status==="sold"){cats[c].sold++;cats[c].revenue+=(i.sold_price||0);}
  });
  const catKeys = Object.keys(cats).sort((a,b)=>cats[b].revenue-cats[a].revenue);
  const suggestions = items.filter(i=>["unposted","photographed"].includes(i.status)).slice(0,3);

  document.getElementById("analyticsWrap").innerHTML = `
    <div style="padding-bottom:20px">
      <div class="section-title">Overview</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">
        <div class="metric-card">
          <div class="metric-card-title">Total Profit</div>
          <div class="metric-big" style="color:${profit>=0?'var(--green)':'var(--red)'}">${profit>=0?"+":""}$${profit.toFixed(0)}</div>
          <div class="metric-sub">from $${totalSpend.toFixed(0)} invested</div>
        </div>
        <div class="metric-card">
          <div class="metric-card-title">Sell-Through</div>
          <div class="metric-big">${str}%</div>
          <div class="metric-sub">${sold.length} of ${items.length} sold</div>
        </div>
        <div class="metric-card">
          <div class="metric-card-title">Avg Profit/Sale</div>
          <div class="metric-big">$${sold.length>0?(profit/sold.length).toFixed(0):0}</div>
          <div class="metric-sub">per sold item</div>
        </div>
        <div class="metric-card">
          <div class="metric-card-title">Pipeline</div>
          <div class="metric-big" style="color:var(--blue)">${pipeline.length}</div>
          <div class="metric-sub">need listing</div>
        </div>
      </div>
      <div class="section-title">Post Next</div>
      ${suggestions.length ? suggestions.map(i=>`
        <div class="suggest-card">
          <div style="font-weight:600;font-size:13px">${i.name}</div>
          <div class="suggest-reason">${i.category||'No category'} · Cost: $${i.cost||0}${i.tier==2?' · TIER 2 ARCHIVE':''}</div>
        </div>`).join('') : '<div class="muted" style="font-size:12px;padding:8px 0">No pipeline items.</div>'}
      <div class="section-title" style="margin-top:16px">By Trip</div>
      ${tripKeys.map(k=>{
        const t = trips[k];
        const w = Math.round((t.revenue/maxRev)*100);
        return `<div class="trip-row">
          <div style="flex:1">
            <div style="font-weight:600;font-size:13px">Trip ${k}${t.city?' — '+t.city:''}</div>
            <div class="trip-bar-wrap"><div class="trip-bar" style="width:${w}%"></div></div>
          </div>
          <div style="text-align:right;margin-left:12px">
            <div class="green" style="font-size:13px">$${t.revenue.toFixed(0)}</div>
            <div class="muted" style="font-size:10px">${t.sold}/${t.total} sold</div>
          </div>
        </div>`;
      }).join('')}
      <div class="section-title" style="margin-top:16px">By Category</div>
      ${catKeys.map(c=>{
        const d = cats[c];
        const s2 = d.total>0?Math.round((d.sold/d.total)*100):0;
        return `<div class="cat-row">
          <div><span style="font-weight:500">${c}</span><span class="muted" style="margin-left:6px;font-size:10px">${d.total} items</span></div>
          <div style="text-align:right"><span class="green">$${d.revenue.toFixed(0)}</span><span class="muted" style="margin-left:8px;font-size:10px">${s2}% STR</span></div>
        </div>`;
      }).join('')}
    </div>`;
}

function buildSystemPrompt() {
  const {sold,posted,pipeline,revenue,profit,str} = getStats();
  const list = items.map(i=>`[ID:${i.id}] "${i.name}" | ${i.status} | cost:$${Number(i.cost||0).toFixed(2)} | sold:$${i.sold_price||0} | cat:${i.category||'?'} | tier:${i.tier||1} | trip:${i.trip}`).join("\n");
  return `You are the AI ops manager for FURUGI, Dee's vintage resale operation. Speak direct, casual, no fluff.

STATS: Pipeline:${pipeline.length} | Live:${posted.length} | Sold:${sold.length} | Spent:$${totalSpend} | Revenue:$${revenue.toFixed(0)} | Profit:${profit>=0?"+":""}$${profit.toFixed(0)} | STR:${str}%

INVENTORY:
${list}

Parse Dee's natural speech. Respond in 1-3 sentences. End with JSON action block.

ACTIONS:
{"action":"sold","id":123,"soldPrice":45}
{"action":"posted","id":123}
{"action":"unposted","id":123}
{"action":"add","name":"item","status":"unposted","cost":0,"soldPrice":0,"trip":1,"category":"","tier":1}
{"action":"spend","amount":150}
{"action":"addspend","amount":40}
Array: [{...},{...}]

RULES: Match items fuzzy by name. "grabbed X,Y,Z for $40" = add items + addspend. No price on sold = ask. Always end with JSON, empty if no action: {}`;
}

async function send() {
  const input = document.getElementById("msgInput");
  const text = input.value.trim();
  if(!text) return;
  input.value = "";
  msgs.push({role:"user",text});
  const wrap = document.getElementById("chatWrap");
  wrap.innerHTML = msgs.map(m=>`<div class="bubble ${m.role}">${m.text.replace(/\n/g,'<br>')}</div>`).join("") + `<div class="typing">···</div>`;
  wrap.scrollTop = wrap.scrollHeight;
  try {
    const res = await fetch(FN_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({system:buildSystemPrompt(),messages:msgs.slice(-10).map(m=>({role:m.role==="ai"?"assistant":"user",content:m.text}))})});
    const data = await res.json();
    const raw = data.content?.[0]?.text||"";
    const jm = raw.match(/(\[[\s\S]*?\]|\{[\s\S]*?\})\s*$/);
    const replyText = raw.replace(/(\[[\s\S]*?\]|\{[\s\S]*?\})\s*$/,"").trim();
    if(jm){
      try{
        const actions = JSON.parse(jm[0]);
        if(Object.keys(actions).length>0||Array.isArray(actions)){
          await fetch(FN_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({actions})}).catch(()=>{});
          applyActionsLocally(actions);
        }
      }catch(e){}
    }
    msgs.push({role:"ai",text:replyText||"Done."});
  } catch(e){msgs.push({role:"ai",text:"Something went wrong, try again."});}
  renderStats();
  renderChat();
}

function quickSend(text){document.getElementById("msgInput").value=text;send();}

function applyActionsLocally(raw) {
  const arr = Array.isArray(raw)?raw:[raw];
  arr.forEach(a=>{
    if(!a?.action) return;
    if(a.action==="sold") items=items.map(i=>i.id===a.id?{...i,status:"sold",sold_price:parseFloat(a.soldPrice)||0}:i);
    else if(a.action==="posted") items=items.map(i=>i.id===a.id?{...i,status:"posted"}:i);
    else if(a.action==="unposted") items=items.map(i=>i.id===a.id?{...i,status:"unposted"}:i);
    else if(a.action==="add"){
      const sku = genSku(a.trip||1, a.city||'NO');
      items.push({id:Date.now(),name:a.name,status:a.status||"unposted",cost:parseFloat(a.cost)||0,sold_price:parseFloat(a.soldPrice)||0,trip:a.trip||1,category:a.category||"",tier:a.tier||1,sku});
    }
    else if(a.action==="spend") totalSpend=parseFloat(a.amount)||totalSpend;
    else if(a.action==="addspend") totalSpend+=parseFloat(a.amount)||0;
  });
}

document.getElementById("msgInput").addEventListener("keydown",e=>{
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}
});

renderChat();
loadData();
</script>
